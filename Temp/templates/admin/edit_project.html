{% extends 'base.html' %}

{% block content %} 
<link rel="stylesheet" href="../static/css/sidetabs.css">
<link rel="stylesheet" href="../static/css/textboxes.css">
<link rel="stylesheet" href="../static/css/buttons.css">
<link rel="stylesheet" href="../static/css/popup.css">
<link rel="stylesheet" href="../static/css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<!-- Page content -->
<h1>Edit A Project...</h1>
<form id="frm1" action="/edit_project" method="POST">
    {% for item in data %}
        <input type="hidden" name="id" value="{{ item.id }}">
        <input name="name" type="text" class="imgURLText" size="70" id="FirstName" value="{{ item.name }}.">
        <input name="purpose" type="text" class="imgURLText" size="70" id="FirstName" value="{{ item.purpose }}">
        <input name="objective" type="text" class="imgURLText" size="70" id="FirstName" value="{{ item.objectve }}">
        <input name="stack" type="text" class="imgURLText" size="70" id="FirstName" value="{{ item.stack }}">
        <input name="start" type="date" class="imgURLText" size="70" id="FirstName" value="{{ item.start}}">
        <input name="end" type="date" class="imgURLText" size="70" id="FirstName" value="{{ item.end }}">
        <input name="github" type="text" class="imgURLText" size="70" id="FirstName" value="{{ item.github }}">
        <input name="result" type="text" class="imgURLText" size="70" id="FirstName" value="{{ item.result }}">
        <input class="imgURLText" type="submit" />
    {% endfor %}
</form>
</div>
{% endblock %}
